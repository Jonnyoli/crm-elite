<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111;
            color: white;
            margin: 0;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .logo {
            width: 30px;
            height: 30px;
            background: #FE6B00;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        h2 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .card {
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .field { margin-bottom: 10px; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .value { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #444;
            border-radius: 8px;
            color: #FE6B00;
            font-family: monospace;
            font-size: 11px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #FE6B00;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { background: #ff8533; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #444; cursor: not-allowed; }

        .status { font-size: 11px; text-align: center; margin-top: 10px; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div className="header">
        <div className="logo">SI</div>
        <h2>Clipper</h2>
    </div>

    <div id="setup-view">
        <div className="label">SI Elite Token</div>
        <input type="text" id="token-input" placeholder="Cola o teu token aqui...">
        <button id="save-token">Guardar Token</button>
    </div>

    <div id="main-view" style="display: none;">
        <div className="card">
            <div className="field">
                <div className="label">Imóvel Detetado</div>
                <div className="value" id="prop-name">A carregar...</div>
            </div>
            <div className="field">
                <div className="label">Preço</div>
                <div className="value" id="prop-price">-</div>
            </div>
        </div>

        <button id="import-btn">Enviar para CRM</button>
        <div id="status-msg" className="status"></div>
        
        <div style="margin-top: 15px; text-align: center;">
            <a href="#" id="change-token" style="color: #666; font-size: 10px; text-decoration: none;">Alterar Token</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
