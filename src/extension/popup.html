<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            margin: 0;
            border-radius: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #FE6B00, #ff8c33);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 0 15px rgba(254, 107, 0, 0.3);
        }
        .title {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .property-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: white;
        }
        .property-price {
            font-size: 18px;
            font-weight: 800;
            color: #FE6B00;
        }
        .seller-info {
            font-size: 11px;
            color: #8b949e;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #30363d;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .btn-primary {
            background-color: #FE6B00;
            color: white;
        }
        .btn-primary:hover {
            background-color: #ff8c33;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background-color: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover {
            background-color: #30363d;
        }
        .status {
            text-align: center;
            font-size: 11px;
            margin-top: 15px;
            color: #8b949e;
        }
        input {
            width: 100%;
            padding: 8px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SI</div>
        <div class="title">SI Elite Clipper</div>
    </div>

    <div id="setup-view" style="display: none;">
        <p style="font-size: 12px; color: #8b949e;">Introduz o teu Token de Acesso para começar:</p>
        <input type="password" id="token-input" placeholder="SI_ELITE_...">
        <button id="save-token" class="btn btn-primary">Ativar Extensão</button>
    </div>

    <div id="main-view">
        <div class="card">
            <div id="prop-name" class="property-name">A detetar imóvel...</div>
            <div id="prop-price" class="property-price">---</div>
            <div id="seller-info" class="seller-info">Sem contacto detectado</div>
        </div>

        <button id="send-market" class="btn btn-primary">Importar para Mercado</button>
        <button id="send-property" class="btn btn-secondary">Mover para Angariações</button>
        
        <p style="text-align: center; cursor: pointer; color: #FE6B00; font-size: 10px; margin-top: 10px;" id="change-token">Alterar Token</p>
    </div>

    <div id="status" class="status"></div>

    <script src="popup.js"></script>
</body>
</html>
